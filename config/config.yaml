data:
  path: "data/house_prices.csv"
  target: "SalePrice"
  test_size: 0.2
  random_state: 42

models:
  linear_regression:
    fit_intercept: true
  random_forest:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 5
  gradient_boosting:
    n_estimators: 300
    learning_rate: 0.05
    max_depth: 5
  xgboost:
    n_estimators: 500
    learning_rate: 0.03
    max_depth: 6
    early_stopping_rounds: 50

evaluation:
  cv_folds: 5
  scoring: "neg_root_mean_squared_error"
